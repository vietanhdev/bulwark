# Flatpak manifest for the Bulwark GUI.
#
# Build locally with scripts/flatpak-build-local.sh (it stages a CLEAN git tree so
# the multi-GB target/ and node_modules are never copied into the sandbox — a
# plain `type: dir` copy of this repo would drag all of that in). See
# packaging/README.md, especially the privileged-scan limitation.
#
# Offline deps (Flatpak builds with no network) are pre-generated by
# scripts/flatpak-gen-sources.sh into cargo-sources.json + node-sources.json.

app-id: com.vietanhdev.bulwark
# NOTE: the Tauri app identifier in tauri.conf.json is still com.vietanhnv.bulwark.
# For the cleanest desktop integration those should match; changing the Tauri one
# is a separate, more invasive change (it moves the app's config/data dirs).

runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20

command: bulwark-app

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Read the host it audits (read-only; the GUI never writes host state).
  - --filesystem=host:ro
  # Its own SQLite history/DB. Needed because --filesystem=host:ro makes $HOME
  # (the real home) read-only, so without this the scan can't persist and fails
  # with "attempt to write a readonly database".
  - --filesystem=xdg-data/bulwark:create
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # Privileged scans can only leave the sandbox via `flatpak-spawn --host pkexec`,
  # which needs this + a host-installed bulwarkctl + an app-code change. See README.
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: bulwark
    buildsystem: simple
    build-options:
      # rust-stable + node20 from the SDK extensions; offline caches wired per the
      # flatpak-builder-tools generators (module name 'bulwark' -> /run/build/bulwark).
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
      env:
        CARGO_HOME: /run/build/bulwark/cargo
        CARGO_NET_OFFLINE: 'true'
        # npm's offline cache, populated by node-sources.json under flatpak-node/.
        XDG_CACHE_HOME: /run/build/bulwark/flatpak-node/cache
        npm_config_cache: /run/build/bulwark/flatpak-node/npm-cache
    build-commands:
      # 1. Frontend deps from the offline cache, then the vite build -> apps/bulwark-app/dist
      #    (which Tauri's build.rs embeds; plain `cargo build` does NOT run beforeBuildCommand).
      - npm install --prefix=apps/bulwark-app --offline
      - npm --prefix=apps/bulwark-app run build
      # 2. GUI binary + the CLI sidecar named `bulwark` (matching resolve_cli_binary).
      - cargo build --release --offline -p bulwark-app
      - cargo build --release --offline -p bulwarkctl
      - install -Dm755 target/release/bulwark-app ${FLATPAK_DEST}/bin/bulwark-app
      - install -Dm755 target/release/bulwarkctl ${FLATPAK_DEST}/bin/bulwark
      # 3. Rule pack beside the binaries. Verified: bulwark-core's resolver finds
      #    /app/bin/rules next-to-exe in-sandbox (the CLI sidecar lists all rules
      #    here with no --rules-dir), so the GUI's in-process scans resolve too.
      - cp -r rules decoders log-rules ${FLATPAK_DEST}/bin/
      # 4. Desktop entry, icon, AppStream metainfo (Flathub requires the last two).
      - install -Dm644 apps/bulwark-app/src-tauri/icons/128x128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.vietanhdev.bulwark.png
      - install -Dm644 packaging/flatpak/com.vietanhdev.bulwark.desktop ${FLATPAK_DEST}/share/applications/com.vietanhdev.bulwark.desktop
      - install -Dm644 packaging/flatpak/com.vietanhdev.bulwark.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.vietanhdev.bulwark.metainfo.xml
    sources:
      - type: dir
        path: ../..
      # Generated by scripts/flatpak-gen-sources.sh (do not hand-edit):
      - cargo-sources.json
      - node-sources.json
