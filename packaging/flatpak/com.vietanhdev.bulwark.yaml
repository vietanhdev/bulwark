# Flatpak manifest for the Bulwark GUI.
#
# Build locally with scripts/flatpak-build-local.sh (it stages a CLEAN git tree so
# the multi-GB target/ and node_modules are never copied into the sandbox — a
# plain `type: dir` copy of this repo would drag all of that in). See
# packaging/README.md, especially the privileged-scan limitation.
#
# Offline deps (Flatpak builds with no network) are pre-generated by
# scripts/flatpak-gen-sources.sh into cargo-sources.json + node-sources.json.

app-id: com.vietanhdev.bulwark
# NOTE: the Tauri app identifier in tauri.conf.json is still com.vietanhnv.bulwark.
# For the cleanest desktop integration those should match; changing the Tauri one
# is a separate, more invasive change (it moves the app's config/data dirs).

runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20

command: bulwark-app

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Read the host it audits (read-only; the GUI never writes host state).
  - --filesystem=host:ro
  # NOTE: no --filesystem=xdg-data/bulwark:create. The app's findings database now
  # resolves via XDG_DATA_HOME, which Flatpak already points at the writable
  # ~/.var/app/<id>/data, so no extra grant is needed. (Requesting one is what
  # flatpak-builder-lint flags as finish-args-unnecessary-xdg-data-access.)
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # WebKitGTK renders nothing in this sandbox without these, which for a Tauri app means a
  # transparent, empty window — the app runs, logs normally, holds its PID, and draws no UI.
  # Its DMA-BUF renderer needs GPU buffer sharing that does not survive the sandbox on many
  # drivers, and its accelerated compositing path fails the same way; both fall back cleanly
  # when switched off. This is the long-standing "blank window in Flatpak" failure behind
  # tauri-apps/tauri#8970 and #10626, and it is not Tauri's bug.
  #
  # Worth noting how long this hid: scripts/test-gui-packages-docker.sh sets exactly these
  # two variables so WebKit works headlessly, so the .deb/.rpm/AppImage rendered under test
  # while the Flatpak — which set neither — did not.
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
  - --env=WEBKIT_DISABLE_COMPOSITING_MODE=1
  # tauri-plugin-single-instance claims a session-bus name at startup, and Flatpak blocks
  # owning any name the manifest does not declare. It is registered as the FIRST plugin
  # (see lib.rs — it is the escape hatch from "closed to tray"), so the denial happens
  # before the UI exists and surfaces as a bare
  #   GDBus.Error:org.freedesktop.portal.Error.NotAllowed
  # painted on a window that is transparent by design. Documented at
  # https://v2.tauri.app/plugin/single-instance/#usage-in-snap-and-flatpak
  #
  # The name is derived from tauri.conf.json's *identifier*, with dots and dashes turned
  # into underscores — NOT from this app-id. The identifier is still com.vietanhnv.bulwark
  # (the typo noted at the top of this file), so the name below reads vietanhnv while the
  # app-id reads vietanhdev. Do not "correct" it here: it must match what the binary asks
  # for, or the app breaks again. Fix them together when the identifier is renamed.
  #
  # ORDER MATTERS, and not in a way the manifest hints at. Both flags write the same key
  # in the built metadata, so the last one wins — and `own` is strictly stronger than
  # `talk`. Listing own-name first (as this file did) silently produced
  #   org.com_vietanhnv_bulwark.SingleInstance=talk
  # and the plugin still could not claim the name, so the app stayed broken while the
  # manifest looked correct. Keep talk-name first, exactly as the Tauri docs show it.
  # Verify with: flatpak info --show-permissions com.vietanhdev.bulwark  (must read `=own`)
  - --talk-name=org.com_vietanhnv_bulwark.SingleInstance
  - --own-name=org.com_vietanhnv_bulwark.SingleInstance
  # NOTE: --talk-name=org.freedesktop.Flatpak (i.e. `flatpak-spawn --host`) is
  # deliberately NOT requested. Privileged scans would need it, but the app-code
  # path that detects /.flatpak-info and reroutes to a host pkexec doesn't exist
  # yet — and flatpak-builder-lint errors on flatpak-spawn access, which would be
  # asking Flathub reviewers for a sandbox escape the code never uses. Add it back
  # in the same change that implements privileged scanning, with a justification.

modules:
  # The system-tray stack, built into the app because the GNOME runtime ships no
  # appindicator or dbusmenu at all. Without it libappindicator-sys's dlopen fails and
  # the app has no tray — which for Bulwark is not cosmetic: the tray is what keeps
  # continuous monitoring running after the window is closed (see tray.rs).
  #
  # This is flathub/shared-modules, vendored as a git submodule, which is the canonical
  # way Flathub apps pull this chain (libdbusmenu + libindicator + libappindicator, plus
  # intltool and dbus-glib). Don't hand-copy the JSON: the patches travel with it, and
  # upstream maintains the FTBFS fixes this 2012-era autotools code needs.
  #
  # `git clone --recurse-submodules`, or `git submodule update --init` in an existing
  # checkout, or the build fails with a missing-module error.
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json

  - name: bulwark
    buildsystem: simple
    build-options:
      # rust-stable + node20 from the SDK extensions; offline caches wired per the
      # flatpak-builder-tools generators (module name 'bulwark' -> /run/build/bulwark).
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
      env:
        CARGO_HOME: /run/build/bulwark/cargo
        CARGO_NET_OFFLINE: 'true'
        # npm's offline cache, populated by node-sources.json under flatpak-node/.
        XDG_CACHE_HOME: /run/build/bulwark/flatpak-node/cache
        npm_config_cache: /run/build/bulwark/flatpak-node/npm-cache
        # The frontend build needs devDependencies (vite, typescript), which drags
        # in @playwright/test — used only by the e2e suite, never by the app. Its
        # postinstall would try to download a browser, which fails in the offline
        # build, so suppress it. (The package itself is still vendored so
        # `npm install --offline` can resolve the lockfile.)
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    build-commands:
      # 1. Frontend deps from the offline cache, then the vite build -> apps/bulwark-app/dist
      #    (which Tauri's build.rs embeds; plain `cargo build` does NOT run beforeBuildCommand).
      - npm install --prefix=apps/bulwark-app --offline
      - npm --prefix=apps/bulwark-app run build
      # 2. GUI binary + the CLI sidecar named `bulwark` (matching resolve_cli_binary).
      - cargo build --release --offline -p bulwark-app
      - cargo build --release --offline -p bulwarkctl
      - install -Dm755 target/release/bulwark-app ${FLATPAK_DEST}/bin/bulwark-app
      - install -Dm755 target/release/bulwarkctl ${FLATPAK_DEST}/bin/bulwark
      # 3. Rule pack beside the binaries, which is where the CLI sidecar's resolver
      #    looks (next-to-exe, no --rules-dir needed).
      #
      #    The GUI does NOT share that resolver. It has its own in src-tauri/src/lib.rs,
      #    and it used to check only Tauri's resource_dir() — which in this layout points
      #    at a directory containing no rules. So the shipped Flatpak started with
      #    "couldn't find a 'rules' directory" and silently ran with continuous monitoring
      #    disabled, while the comment here claimed the path was verified. It wasn't: the
      #    CLI was tested and the GUI was *inferred* from it. resolve_rules_dir now has an
      #    explicit next-to-exe fallback, and scripts/test-gui-packages-docker.sh launches
      #    the real GUI and fails if that warning ever appears again. Test the binary that
      #    ships, not a sibling that shares a directory with it.
      - cp -r rules decoders log-rules ${FLATPAK_DEST}/bin/
      # 4. Desktop entry, icon, AppStream metainfo (Flathub requires the last two).
      # Flathub requires >=256px (or SVG); icon.png is 512x512. The 128px copy stays
      # so smaller icon slots don't have to downscale the 512.
      - install -Dm644 apps/bulwark-app/src-tauri/icons/icon.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/com.vietanhdev.bulwark.png
      - install -Dm644 apps/bulwark-app/src-tauri/icons/128x128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.vietanhdev.bulwark.png
      - install -Dm644 packaging/flatpak/com.vietanhdev.bulwark.desktop ${FLATPAK_DEST}/share/applications/com.vietanhdev.bulwark.desktop
      - install -Dm644 packaging/flatpak/com.vietanhdev.bulwark.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.vietanhdev.bulwark.metainfo.xml
    sources:
      - type: dir
        path: ../..
      # Generated by scripts/flatpak-gen-sources.sh (do not hand-edit):
      - cargo-sources.json
      - node-sources.json
