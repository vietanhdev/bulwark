id: BLWK-LOG-PAM-001
title: "Repeated authentication failures for {{ user }}"
category: accounts-services
severity: medium
decoder: pam
# Exclude the interactive desktop login/lock managers: a human mistyping their password at the GDM
# greeter or a screen-lock prompt produces the same pam_unix auth-failure line as an sshd brute
# force, and 5 fat-fingered unlocks in two minutes is routine, not an attack. `service` is the PAM
# stack name (sshd, sudo, login, gdm-password, …). This is a denylist, not an allowlist, so an
# unrecognized service still fires — the security-safe default (fail toward detecting).
condition: 'tags contains "authentication_failed" and not service matches "^(gdm-password|gdm3?|lightdm|sddm|lxdm|xdm|gnome-screensaver|light-locker|polkit-1)$"'
groups: [authentication_failures]
correlate:
  count: 5
  window_secs: 120
  by: [user]
  suppress_secs: 300
explain: >
  The account "{{ user }}" failed authentication 5 or more times within two minutes across
  PAM-using services (login, cron, sshd, su...). Concentrated failures against one account, rather
  than one source, point at a targeted password attack on that specific user.
fix: >
  Confirm the account isn't simply misconfigured (a stale saved password, an expired credential).
  If not, lock or investigate the account and review where the attempts are coming from.
references: [ATTACK-T1110]
