name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # webkit2gtk + friends, needed to compile bulwark-app's Tauri backend on Linux.
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: Validate the bundled rule pack
        run: cargo run -p bulwarkctl -- rules validate rules/

  # Source-level compile + test of the non-GUI crates across several Linux distros, so a
  # glibc / toolchain / libc-behaviour difference is caught on every push — not only when the
  # release job install-tests the packaged artifacts. Deliberately spread across Debian (stable,
  # old glibc), Fedora (dnf, newer) and Arch (rolling, newest) rather than three Ubuntu points.
  #
  # bulwark-app (Tauri/webkit) is excluded: its cross-distro story is the *packaged* GUI, which
  # release.yml's verify-install matrix already installs and link-checks on five distros. The CLI
  # and core need nothing but a C compiler — SQLite is vendored (libsqlite3-sys "bundled") and
  # there is no OpenSSL — so every image here installs the same tiny toolchain and nothing else.
  test-distros:
    strategy:
      # One red cell should name the distro that broke, not cancel its siblings.
      fail-fast: false
      matrix:
        include:
          # libc6-dev explicitly: with --no-install-recommends, Debian's `gcc` does NOT pull it
          # (only Recommends), so the C runtime objects (Scrt1.o/crti.o) and -lc go missing and
          # every link fails. Fedora/Arch pull their libc-dev as a hard dep, hence gcc alone works.
          - { image: "debian:12", install: "apt-get update && apt-get install -y --no-install-recommends curl gcc libc6-dev git ca-certificates" }
          - { image: "fedora:41", install: "dnf install -y -q gcc git which" }
          - { image: "archlinux:latest", install: "pacman -Sy --noconfirm gcc git curl" }
    name: test (${{ matrix.image }})
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}
    # A bare container runs `run:` steps under sh (dash), which has no `set -o pipefail`; pin bash.
    defaults:
      run:
        shell: bash
    steps:
      # Must precede checkout: the checkout action needs git in the container (else it silently
      # falls back to a metadata-less REST tarball), and running as root over the runner-owned
      # workspace trips git's "dubious ownership" guard without this safe.directory opt-out.
      - name: Install toolchain dependencies
        run: |
          set -euo pipefail
          ${{ matrix.install }}
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - uses: actions/checkout@v7

      - name: Install Rust (rustup, stable, minimal)
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"

      - name: cargo test (workspace minus the GUI)
        run: cargo test --workspace --exclude bulwark-app

  # Fails the build on a known-vulnerable or yanked dependency (RustSec advisory DB). Kept as its
  # own job so an advisory shows up as a distinct red check rather than being buried in `test`.
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # The ignored IDs are all inherited transitively from Tauri v2 — the Linux GTK3 backend
      # (glib/gtk/gdk/atk) and urlpattern's unic-ucd chain — not from any direct dependency, and
      # cannot be resolved until Tauri moves off them. They are unmaintained/unsound advisories with
      # no code path reachable from Bulwark's own usage. Every other advisory (including any future
      # one in a crate we control) still fails this job.
      - name: cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2024-0411 \
            --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2024-0414 \
            --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 \
            --ignore RUSTSEC-2024-0417 \
            --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 \
            --ignore RUSTSEC-2024-0420 \
            --ignore RUSTSEC-2025-0098

  changes:
    runs-on: ubuntu-24.04
    outputs:
      rules_or_collectors: ${{ steps.filter.outputs.rules_or_collectors }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rules_or_collectors:
              - 'rules/**'
              - 'crates/bulwark-core/src/collectors/**'
              - 'tests/e2e/**'
              - 'crates/bulwarkctl/tests/e2e.rs'

  # Gated to only run when rules/collectors/fixtures actually changed — building the fixture
  # images adds real CI time (a handful of small apt-installs, not compilation, but not free)
  # that unrelated frontend/docs-only PRs shouldn't pay. Always runs on a direct push to main
  # (dorny/paths-filter's push-diff behavior is less precise than on a PR's base comparison).
  # Docker is preinstalled (rootful, real root) on GitHub-hosted runners, so no setup step is
  # needed beyond checkout and the build itself — unlike this project's own dev machine, which
  # has no passwordless sudo and `unshare --map-root-user` blocked by
  # kernel.apparmor_restrict_unprivileged_userns=1 (see the Lynis benchmark research page),
  # GitHub's hosted runners go through an already-root dockerd, not user-namespace tricks.
  e2e:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rules_or_collectors == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run e2e fixture tests
        run: cargo test -p bulwarkctl --test e2e -- --ignored --test-threads=1

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/bulwark-app
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/bulwark-app/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  # Renders every docs mermaid diagram against the exact mermaid version the site ships and fails
  # if any produces a syntax error. VitePress builds fine with a broken diagram — mermaid only errors
  # at client render time — so nothing else catches "Syntax error in text" before a human loads the
  # page. Runs before/independently of the Vercel deploy, on every push and PR.
  docs-diagrams:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
      # A full VitePress build, not just a syntax check. VitePress compiles every page as a Vue
      # SFC, so a literal `{{ … }}` in prose is parsed as an interpolation and a non-JS expression
      # (e.g. an empty `{{ }}` describing the rule templating syntax) fails the build. Only the
      # production build catches this — it shipped to the Vercel deploy once because CI ran only the
      # mermaid check below. Escape such braces with a `v-pre` span.
      - run: npm run build
      # The check renders in a headless browser (mermaid's parser needs a DOM), so it needs the
      # Chromium Playwright already depends on.
      - run: npx playwright install --with-deps chromium
      - run: npm run mermaid:check
