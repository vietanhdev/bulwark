name: Release

# Tag-driven: `git tag v0.1.0 && git push origin v0.1.0` cuts a release. `workflow_dispatch`
# builds every artifact and uploads them to the run itself *without* publishing a GitHub
# Release, so the packaging can be exercised end to end before a version number is burned —
# a tag, once pushed and released, is not something you want to be debugging.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    # The oldest glibc the build links against becomes the oldest distro the artifacts can run
    # on, so that floor is a release-visible decision — not an incidental property of whichever
    # image GitHub happens to point a label at. `cargo deb`'s `depends = "$auto"` reads the floor
    # straight off the BUILD HOST: build on glibc 2.39 and the .deb declares `libc6 (>= 2.39)`,
    # which apt then refuses to install on Ubuntu 22.04 (2.35) and Debian 12 (2.36). Nothing about
    # that failure is visible at build time — it is a broken download, discovered by the user.
    #
    # Hence the container. `runs-on` is now just "a machine with Docker" and can track whatever
    # GitHub supports, while the glibc floor lives in an image WE pin. This matters on a clock:
    # the `ubuntu-22.04` runner label begins deprecation 2026-09-17 and is removed 2027-04-17
    # (actions/runner-images#14254), and the day it disappears, a `runs-on: ubuntu-22.04` build
    # would silently start emitting `libc6 (>= 2.39)` packages. Pinning the image instead of the
    # runner makes that entire class of event a non-issue.
    #
    # ---- Architecture ----
    # Two arches, built NATIVELY on their own runner rather than cross-compiled. GitHub's
    # `ubuntu-24.04-arm` runners are free for public repositories, which makes native the cheap
    # option as well as the correct one — and cross-compiling would walk straight into a real
    # trap in this repo: src-tauri/build.rs stages the CLI sidecar from `target/<profile>/`, the
    # HOST target dir, so a `--target aarch64-...` build would silently stage an x86_64 binary
    # under an aarch64 triple's name. `ubuntu:22.04` is a multi-arch image, so the glibc floor
    # above is pinned identically on both.
    #
    # Both arches build the GUI as well as the CLI. That is only defensible because the aarch64
    # GUI goes through the same gate as the x86_64 one: verify-gui-launch installs the real
    # package on that arch, starts the real binary under Xvfb, and screenshots it. This project
    # has already shipped a GUI that passed every structural check and could not draw a window,
    # so "it built on aarch64" is explicitly NOT the bar — "it drew a window on aarch64" is.
    # If that job cannot be made to pass, set `gui: false` here rather than publishing anyway.
    runs-on: ${{ matrix.runner }}
    strategy:
      # One arch failing should name that arch, not cancel its sibling and hide the blast radius.
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64,  deb_arch: amd64, runner: ubuntu-24.04,     gui: true }
          - { arch: aarch64, deb_arch: arm64, runner: ubuntu-24.04-arm, gui: true }
    name: build (${{ matrix.arch }})
    container:
      image: ubuntu:22.04
    # Inside a bare container GitHub runs `run:` steps under `sh` (dash), which has no
    # `set -o pipefail` — every step below opens with `set -euo pipefail` and would die on
    # "Illegal option -o pipefail". ubuntu:22.04 ships bash, so pin every run step to it.
    defaults:
      run:
        shell: bash
    steps:
      # Must precede actions/checkout: the checkout action needs git present in the container,
      # and falls back to a REST tarball (no git metadata) if it is missing. The base image is
      # bare, so everything the later actions assume — curl for rustup, a C toolchain for cc,
      # ca-certificates for TLS — has to be installed here first.
      #
      # No `sudo` anywhere in this job: a container step already runs as root, and the base image
      # does not ship sudo at all.
      - name: Bootstrap the 22.04 build image
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl file git pkg-config build-essential \
            libssl-dev rpm xz-utils
          # The GTK/WebKit stack is needed only to build the GUI, and is a slow install that
          # bulwark-core and bulwarkctl link none of. Both arches currently set gui: true, so
          # this branch is not skipped today — it exists so that setting gui: false for an arch
          # (the documented fallback if its GUI cannot be made to launch) actually makes that
          # arch's build cheaper and independent of the GTK stack, rather than still hinging on
          # an apt install it has no use for.
          #
          # xdg-utils provides /usr/bin/xdg-open, which Tauri's AppImage bundler embeds into the
          # bundle (the app opens URLs/files via it at runtime). The bare image lacks it, and its
          # absence fails only the AppImage step — after the .deb and .rpm have already built — so
          # it must be installed here, not discovered at bundle time.
          if [ "${{ matrix.gui }}" = "true" ]; then
            apt-get install -y --no-install-recommends \
              libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
              librsvg2-dev patchelf xdg-utils
          fi
          # Checkout runs as root over a workspace owned by the runner uid; without this git
          # refuses with "detected dubious ownership" and the build fails before it starts.
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            # A tag that disagrees with the workspace version would publish assets whose
            # filenames and embedded --version output contradict each other.
            if [ "${TAG_VERSION}" != "${CARGO_VERSION}" ]; then
              echo "::error::tag ${GITHUB_REF_NAME} does not match workspace version ${CARGO_VERSION} — bump Cargo.toml (and tauri.conf.json / package.json) first"
              exit 1
            fi
          fi
          echo "version=${CARGO_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version ${CARGO_VERSION}"

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Explicit, even though the action already folds the matrix into its key: an x86_64
          # cache restored into an aarch64 build would poison target/ with foreign objects, and
          # the resulting link errors would read like a source bug.
          key: ${{ matrix.arch }}

      - uses: actions/setup-node@v7
        if: matrix.gui
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/bulwark-app/package-lock.json

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Install frontend dependencies
        if: matrix.gui
        working-directory: apps/bulwark-app
        run: npm ci

      # ---- CLI (bulwarkctl) ----
      - name: Build CLI
        run: cargo build --release -p bulwarkctl

      - name: Package CLI (.deb, .rpm, tarball)
        run: |
          set -euo pipefail
          cargo deb -p bulwarkctl --no-build
          cargo generate-rpm -p crates/bulwarkctl

          # Plain tarball for distros with neither dpkg nor rpm. Ships the rule pack alongside
          # the binary — bulwarkctl resolves /usr/share/bulwark/rules when installed, so a
          # bare binary with no rules is useless on its own.
          V="${{ steps.version.outputs.version }}"
          STAGE="bulwarkctl-${V}-${{ matrix.arch }}-linux"
          mkdir -p "${STAGE}"
          cp target/release/bulwarkctl "${STAGE}/"
          cp -r rules "${STAGE}/"
          cp README.md LICENSE "${STAGE}/"
          tar -czf "${STAGE}.tar.gz" "${STAGE}"

      # ---- GUI (bulwark-app) ----
      # Produces .deb, .rpm and .AppImage in target/release/bundle/ (bundle.targets = "all").
      - name: Build and bundle GUI
        if: matrix.gui
        working-directory: apps/bulwark-app
        # Tauri's AppImage bundler shells out to `linuxdeploy`, which is itself an AppImage — and
        # an AppImage mounts itself with FUSE, which does not exist inside a container. Without
        # this, the bundle step dies on a fuse mount error that reads like a Tauri bug. The flag
        # tells the AppImage runtime to unpack to a temp dir and exec from there instead of
        # mounting. It affects only the build-time tooling, not the AppImage we ship.
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run tauri build

      - name: Collect artifacts
        id: collect
        run: |
          set -euo pipefail
          V="${{ steps.version.outputs.version }}"
          A="${{ matrix.arch }}"
          DA="${{ matrix.deb_arch }}"
          mkdir -p dist

          # cargo-deb and cargo-generate-rpm both infer the architecture from the build host and
          # neither declares one in Cargo.toml, so these names follow the matrix rather than
          # needing any metadata change: amd64/x86_64 on one runner, arm64/aarch64 on the other.
          cp target/debian/bulwarkctl_${V}-1_${DA}.deb   "dist/bulwarkctl_${V}_${DA}.deb"
          cp target/generate-rpm/bulwarkctl-${V}-1.${A}.rpm "dist/bulwarkctl-${V}.${A}.rpm"
          cp bulwarkctl-${V}-${A}-linux.tar.gz           "dist/"

          # Match by version+arch, not a hardcoded name. The GUI's productName is lowercase
          # `bulwark` (so install paths are FHS-conventional: /usr/lib/bulwark, bulwark.desktop),
          # while the desktop launcher shows "Bulwark" via a desktopTemplate. Tauri names the raw
          # bundles after productName; globbing on the stable version+arch suffix keeps this step
          # working regardless of that name, and the copies below give every asset the public
          # `bulwark-desktop-*` name the download page links to.
          if [ "${{ matrix.gui }}" = "true" ]; then
            cp "$(ls target/release/bundle/deb/*_${V}_${DA}.deb)"  "dist/bulwark-desktop_${V}_${DA}.deb"
            cp "$(ls target/release/bundle/rpm/*-${V}-1.${A}.rpm)" "dist/bulwark-desktop-${V}.${A}.rpm"
            # The AppImage glob deliberately does NOT pin an arch token. Tauri's bundlers do not
            # agree on the spelling — the .deb gets Debian's `arm64`, the .rpm gets rpm's
            # `aarch64`, and the AppImage has used both across versions. Guessing wrong here
            # fails the release late, after everything has already compiled. Each build job
            # produces exactly one AppImage, so version alone identifies it unambiguously; the
            # copy below is what gives it the canonical arch name the download page links to.
            cp "$(ls target/release/bundle/appimage/*_${V}_*.AppImage)" "dist/bulwark-desktop-${V}-${A}.AppImage"
          fi

          # NB: no SHA256SUMS here. Each arch builds in its own job, so a per-job checksum file
          # would cover only that arch's assets and the two would collide when the release job
          # merges them. It is generated once, over the merged dist, in the release job.
          echo "--- release assets (${A}) ---"
          ls -la dist

      # Fails the build rather than shipping a package whose contents are wrong. `cargo deb`
      # succeeding only proves the metadata parsed — it says nothing about whether the rule
      # pack actually made it in, which is exactly the bug this project has hit before.
      - name: Verify package contents
        run: |
          set -euo pipefail
          V="${{ steps.version.outputs.version }}"
          A="${{ matrix.arch }}"
          DA="${{ matrix.deb_arch }}"

          check_rules() {
            local label="$1" count="$2"
            if [ "${count}" -lt 50 ]; then
              echo "::error::${label} contains only ${count} rule files — the rule pack is missing or truncated"
              exit 1
            fi
            echo "OK: ${label} ships ${count} rules"
          }

          check_rules "CLI .deb" \
            "$(dpkg-deb --contents dist/bulwarkctl_${V}_${DA}.deb | grep -c '\.yaml$')"
          check_rules "CLI .rpm" \
            "$(rpm -qlp dist/bulwarkctl-${V}.${A}.rpm 2>/dev/null | grep -c '\.yaml$')"
          if [ "${{ matrix.gui }}" = "true" ]; then
            check_rules "GUI .deb" \
              "$(dpkg-deb --contents dist/bulwark-desktop_${V}_${DA}.deb | grep -c '\.yaml$')"
          fi

          # The CLI binary must actually run — a package that installs a binary the target
          # distro can't execute is worse than no package.
          dpkg-deb --contents dist/bulwarkctl_${V}_${DA}.deb | grep -q 'usr/bin/bulwarkctl'
          echo "OK: CLI .deb ships /usr/bin/bulwarkctl"

          # The packaged binary must be built FOR the arch the filename claims. cargo-deb infers
          # the arch from the build host, so a misconfigured runner would produce a package that
          # is internally consistent and still wrong for everyone who downloads it — apt would
          # install it happily and every invocation would die with "Exec format error".
          case "${A}" in
            x86_64)  want="x86-64" ;;
            aarch64) want="ARM aarch64" ;;
            *)       echo "::error::unknown arch ${A}"; exit 1 ;;
          esac
          got="$(file -b target/release/bulwarkctl)"
          case "${got}" in
            *"${want}"*) echo "OK: bulwarkctl is a ${want} binary, matching the ${A} package name" ;;
            *)           echo "::error::built binary is '${got}' but is being packaged as ${A}"; exit 1 ;;
          esac

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bulwark-linux-${{ matrix.arch }}
          path: dist/*
          retention-days: 14

  # Building on 22.04 pins the glibc floor. It proves nothing about whether the packages
  # actually *install and run* on the distros the download page promises — a `Depends` line that
  # can't be satisfied, or a binary with an unresolved `.so`, is a broken download that the build
  # job would happily wave through. So every release now installs its own artifacts into a clean
  # container per supported distro and runs a real scan. This is the job that gets to say
  # "supports Ubuntu 24.04 and 26.04"; the build job only gets to say "it compiled".
  #
  # Ubuntu 26.04 (resolute, glibc 2.43) still ships libwebkit2gtk-4.1-0, so the GUI's GTK3 WebKit
  # dependency resolves there today. That is exactly the fact this job exists to keep honest: when
  # Ubuntu eventually drops the 4.1 (GTK3) packages in favour of libwebkitgtk-6.0 (GTK4), the GUI
  # .deb becomes uninstallable on that release, and this matrix goes red on the release *before*
  # users find out. Tauri v2 has no GTK4 backend to migrate to, so the fallback at that point is
  # the AppImage — which is why it is smoke-tested here too rather than merely uploaded.
  #
  # Each arch verifies on its OWN native runner rather than under qemu on an x86_64 one. An
  # emulated smoke test proves the binary decodes, not that it runs on the hardware users have,
  # and qemu-user papers over exactly the low-level differences (unaligned access, page size,
  # atomics) worth catching. Native aarch64 runners are free for public repos, so there is no
  # reason to accept the weaker signal.
  verify-install:
    needs: linux
    runs-on: ${{ matrix.runner }}
    strategy:
      # Every distro reports independently. One red cell should name the distro that broke, not
      # cancel its siblings and leave the blast radius unknown.
      fail-fast: false
      matrix:
        include:
          - { image: "ubuntu:22.04", pkg: deb, gui: true,  arch: x86_64,  deb_arch: amd64, runner: ubuntu-24.04 }
          - { image: "ubuntu:24.04", pkg: deb, gui: true,  arch: x86_64,  deb_arch: amd64, runner: ubuntu-24.04 }
          - { image: "ubuntu:26.04", pkg: deb, gui: true,  arch: x86_64,  deb_arch: amd64, runner: ubuntu-24.04 }
          - { image: "debian:12",    pkg: deb, gui: true,  arch: x86_64,  deb_arch: amd64, runner: ubuntu-24.04 }
          - { image: "fedora:41",    pkg: rpm, gui: false, arch: x86_64,  deb_arch: amd64, runner: ubuntu-24.04 }
          # Identical distro coverage on aarch64. Deliberately not a reduced set: the whole point
          # of the arm64 rows is to catch a distro/arch interaction (a WebKit or glibc difference
          # that exists only on arm64), and a thinner matrix would be most likely to miss exactly
          # that. fedora is rpm/CLI-only on both arches for the same reason it always was.
          - { image: "ubuntu:22.04", pkg: deb, gui: true,  arch: aarch64, deb_arch: arm64, runner: ubuntu-24.04-arm }
          - { image: "ubuntu:24.04", pkg: deb, gui: true,  arch: aarch64, deb_arch: arm64, runner: ubuntu-24.04-arm }
          - { image: "ubuntu:26.04", pkg: deb, gui: true,  arch: aarch64, deb_arch: arm64, runner: ubuntu-24.04-arm }
          - { image: "debian:12",    pkg: deb, gui: true,  arch: aarch64, deb_arch: arm64, runner: ubuntu-24.04-arm }
          - { image: "fedora:41",    pkg: rpm, gui: false, arch: aarch64, deb_arch: arm64, runner: ubuntu-24.04-arm }
    name: verify (${{ matrix.image }}, ${{ matrix.arch }})
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: bulwark-linux-${{ matrix.arch }}
          path: dist

      - name: Install and smoke-test on ${{ matrix.image }}
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/dist:/dist:ro" "${{ matrix.image }}" bash -euo pipefail -c '
            set -x

            # `scan` exits 1 on medium+ findings and 2 on critical — and every bare container is
            # full of findings (no ClamAV, default login.defs, ...). A non-zero exit is the tool
            # WORKING. Only a crash (101), a missing shared library (127), or a usage error (any
            # other code) is a real failure, so the smoke test asserts the code is one of 0/1/2
            # rather than the usual `set -e` "must exit 0".
            smoke() {
              local code=0
              bulwarkctl scan --json > /tmp/scan.json || code=$?
              case "${code}" in
                0|1|2) echo "OK: scan exited ${code} (a findings-based code, not a crash)" ;;
                127)   echo "::error::bulwarkctl exited 127 — a shared library it links against is missing on ${{ matrix.image }}"; exit 1 ;;
                *)     echo "::error::bulwarkctl scan crashed with exit ${code} on ${{ matrix.image }}"; exit 1 ;;
              esac

              # An empty findings array would mean the rule pack did not ship with the package —
              # the exact bug the release job already guards against at packaging time. Re-check it
              # here, against a *really installed* package rather than an archive listing.
              local n
              n=$(grep -o "\"rule_id\"" /tmp/scan.json | wc -l)
              if [ "${n}" -lt 1 ]; then
                echo "::error::installed package produced 0 findings on ${{ matrix.image }} — the rule pack is not resolving from /usr/share/bulwark/rules"
                exit 1
              fi
              echo "OK: installed CLI produced ${n} findings from the packaged rule pack"

              # The zero-rule guard: a scan that loads no rules must FAIL, not silently report a
              # clean host. Point it at a directory that does not exist and require a non-zero exit.
              if bulwarkctl scan --rules-dir /nonexistent/rules --json > /dev/null 2>&1; then
                echo "::error::a scan with a missing rules dir exited 0 on ${{ matrix.image }} — the zero-rule guard is gone; an unconfigured install would report a false all-clear"
                exit 1
              fi
              echo "OK: a scan that loads no rules fails instead of reporting a false all-clear"
            }

            if [ "${{ matrix.pkg }}" = "deb" ]; then
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              # `apt-get install ./file.deb` (not `dpkg -i`) so that unsatisfiable dependencies
              # FAIL here instead of leaving a half-configured package the way dpkg would.
              apt-get install -y -qq /dist/bulwarkctl_*_${{ matrix.deb_arch }}.deb
              bulwarkctl --version
              smoke

              if [ "${{ matrix.gui }}" = "true" ]; then
                # The GUI cannot be launched in a headless container, but the two things that
                # actually break across distro versions can both be checked without a display:
                # whether its Depends resolve, and whether every .so it links against is present.
                apt-get install -y -qq /dist/bulwark-desktop_*_${{ matrix.deb_arch }}.deb
                echo "OK: GUI .deb dependencies resolve on ${{ matrix.image }}"

                # apt resolving the Depends line only proves the packages Tauri *declared* exist.
                # Tauri dependency auto-detection is known to be incomplete (tauri#7074), so a
                # library can be genuinely missing while apt reports success — ldd is what actually
                # proves the binary can start.
                if ldd /usr/bin/bulwark-app | grep "not found"; then
                  echo "::error::bulwark-app has unresolved shared libraries on ${{ matrix.image }}"
                  exit 1
                fi
                echo "OK: GUI binary has every shared library it needs (incl. webkit2gtk-4.1)"

                # Layout invariants the GUI package must satisfy on a real install:

                # 1. FHS-conventional lowercase resource dir (productName is "bulwark", not "Bulwark").
                test -d /usr/lib/bulwark/rules || { echo "::error::/usr/lib/bulwark/rules missing on ${{ matrix.image }} — resource dir casing regressed"; exit 1; }
                echo "OK: rules install under lowercase /usr/lib/bulwark"

                # 2. The bundled CLI sidecar resolves its own rule pack with no --rules-dir. A
                #    GUI-only install used to fail here (could not find a rules directory).
                sc=0; /usr/bin/bulwark scan --json > /tmp/side.json 2>/tmp/side.err || sc=$?
                case "${sc}" in 0|1|2) : ;; *) echo "::error::bundled bulwark crashed standalone (exit ${sc}) on ${{ matrix.image }}"; cat /tmp/side.err; exit 1 ;; esac
                sn=$(grep -o "\"rule_id\"" /tmp/side.json | wc -l)
                test "${sn}" -ge 1 || { echo "::error::bundled bulwark found 0 rules standalone on ${{ matrix.image }}"; exit 1; }
                echo "OK: bundled bulwark resolves its rule pack standalone (${sn} findings)"

                # 3. Polkit policy installed and well-formed. A double hyphen in its XML comment once
                #    made a strict parser reject the whole file, so it never loaded.
                test -f /usr/share/polkit-1/actions/com.bulwark.policy || { echo "::error::polkit policy not installed by the GUI package on ${{ matrix.image }}"; exit 1; }
                apt-get install -y -qq libxml2-utils
                xmllint --noout /usr/share/polkit-1/actions/com.bulwark.policy || { echo "::error::polkit policy is not valid XML on ${{ matrix.image }}"; exit 1; }
                echo "OK: polkit policy installed and valid XML"

                # 4. The launcher is shown as "Bulwark" (capitalized) in the app menu, even though
                #    the package/paths are lowercase.
                grep -qx "Name=Bulwark" /usr/share/applications/bulwark.desktop || { echo "::error::desktop launcher Name is not Bulwark on ${{ matrix.image }}"; exit 1; }
                echo "OK: desktop launcher displays as Bulwark"
              fi
            else
              dnf install -y -q /dist/bulwarkctl-*.${{ matrix.arch }}.rpm
              bulwarkctl --version
              smoke
            fi

            echo "PASSED: ${{ matrix.image }}"
          '

  # The AppImage is the escape hatch for any distro whose packaged WebKit has moved on (and the
  # only artifact a non-deb/rpm user gets), so it earns the same treatment: unpacked and linkage-
  # checked on the NEWEST distro, where a dropped GTK3 WebKit would surface first. Extracted
  # rather than executed because AppImage's runtime needs FUSE, which a container doesn't have —
  # --appimage-extract exercises the payload without it.
  verify-appimage:
    needs: linux
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64,  multiarch: x86_64-linux-gnu,  runner: ubuntu-24.04 }
          - { arch: aarch64, multiarch: aarch64-linux-gnu, runner: ubuntu-24.04-arm }
    name: verify-appimage (${{ matrix.arch }})
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: bulwark-linux-${{ matrix.arch }}
          path: dist

      - name: Extract and link-check the AppImage on Ubuntu 26.04
        env:
          # The bundled-library search path is per-arch: an AppImage lays its libs out under the
          # GNU multiarch triple, so a hardcoded x86_64-linux-gnu would find NOTHING on aarch64
          # and the check would then report every bundled library as missing — a red job that
          # says "bundling regression" when the truth is "the test looked in the wrong place".
          MULTIARCH: ${{ matrix.multiarch }}
        run: |
          set -euo pipefail
          docker run --rm -e MULTIARCH -v "$PWD/dist:/dist:ro" ubuntu:26.04 bash -euo pipefail -c '
            set -x
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq

            cp /dist/*.AppImage /tmp/app.AppImage
            chmod +x /tmp/app.AppImage
            cd /tmp && ./app.AppImage --appimage-extract >/dev/null

            BIN=$(find /tmp/squashfs-root -type f -name "bulwark-app" | head -1)
            [ -n "${BIN}" ] || { echo "::error::AppImage does not contain the bulwark-app binary"; exit 1; }

            # The AppImage carries its own webkit2gtk / GTK stack, so point the loader at the bundled
            # libs the way AppRun does at launch; a naked ldd would otherwise call every bundled lib
            # "not found". What must still resolve is everything the bundle is RESPONSIBLE for. The
            # graphics-driver stack (GL/EGL/DRM/GBM), the X11 / XCB / Wayland core, and the base font
            # libs are deliberately NOT bundled by any AppImage — they must come from the host to
            # match its GPU driver and display server (the standard AppImage excludelist) — so on a
            # bare server container, which has no desktop stack at all, they legitimately show as
            # "not found" and are filtered out below. Anything OUTSIDE that host-provided set that is
            # missing IS a real bundling regression: a webkit / GTK / pango / cairo / glib dep the
            # AppImage failed to carry. webkit is deliberately never apt-installed here, so such a
            # regression cannot be masked by a host copy.
            export LD_LIBRARY_PATH="$(find /tmp/squashfs-root -type d -name lib -o -type d -name "${MULTIARCH}" | tr "\n" ":")"

            host_provided="lib(GL|GLX|GLdispatch|GLESv2|OpenGL|EGL|glapi|drm|gbm|X11|X11-xcb|xcb|xcb-[a-z0-9]+|Xext|Xrender|Xfixes|Xi|Xcursor|Xdamage|Xcomposite|Xrandr|Xinerama|Xtst|Xss|xshmfence|wayland-[a-z]+|harfbuzz|fontconfig|freetype|expat|fribidi)\.so"
            missing=$(ldd "${BIN}" | grep "not found" | grep -vE "${host_provided}" || true)
            if [ -n "${missing}" ]; then
              echo "::error::AppImage is missing libraries it should bundle (its webkit/GTK stack) on a stock Ubuntu 26.04:"
              echo "${missing}"
              exit 1
            fi
            echo "PASSED: the AppImage bundles its webkit/GTK stack; only host-provided graphics/X11/font libs resolve from the system, exactly as an AppImage expects"
          '

  # Launch the GUI packages for real.
  #
  # Everything above this point — "cargo tauri build exited 0", "the .deb contains 65 rule
  # files", "the AppImage's linkage resolves" — was true of a Flatpak that crashed on launch,
  # because none of it starts the GUI. A binary can pass every structural check and still die
  # before it draws a window (a dlopen panic for a library the runtime lacks) or come up
  # silently degraded (its own rules resolver finding nothing, disabling monitoring). The only
  # assertion that catches that is running the thing and reading what it prints.
  #
  # Runs per-arch on that arch's OWN native runner. This job starts a real WebKit GUI, so
  # emulation is not an option: under qemu-user it would be minutes-per-frame slow and would
  # fail on graphics paths no real user touches, making a red result meaningless. Native arm64
  # runners make the honest version of this test the cheap one too.
  verify-gui-launch:
    needs: linux
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64,  runner: ubuntu-24.04 }
          - { arch: aarch64, runner: ubuntu-24.04-arm }
    name: verify-gui-launch (${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: bulwark-linux-${{ matrix.arch }}
          path: build/relassets

      - name: Launch-test the GUI .deb, .rpm and AppImage
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          # Artifact filenames carry the version; the script globs for them.
          ls -1 build/relassets
          scripts/test-gui-packages-docker.sh

  release:
    needs: [linux, verify-install, verify-appimage, verify-gui-launch]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          echo "version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with:
          # Every arch the build matrix produced, flattened into one dist/. Using a pattern
          # rather than naming the arches means adding a third one to the build matrix needs no
          # edit here — and, more importantly, a build job that silently stopped producing
          # artifacts cannot be papered over by a name that still resolves.
          pattern: bulwark-linux-*
          merge-multiple: true
          path: dist

      # Generated here, not per build job: each of those sees only its own arch, so two partial
      # SHA256SUMS files would collide on merge and whichever landed last would silently omit
      # half the release. One file, written once, over everything that is actually shipping.
      - name: Checksum the merged assets
        run: |
          set -euo pipefail
          cd dist
          rm -f SHA256SUMS
          sha256sum -- * > SHA256SUMS
          echo "--- release assets ---"
          ls -la
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      # Only on a real tag. A workflow_dispatch run stops at the artifact upload above, so the
      # whole pipeline — including the install matrix — can be rehearsed without creating a
      # public release.
      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          draft: true
          generate_release_notes: true
          name: Bulwark ${{ github.ref_name }}
          body: |
            ## Install

            Every artifact ships for **x86_64 and arm64**. Pick the one matching `uname -m`
            (`x86_64` → amd64/x86_64 assets, `aarch64` → arm64/aarch64 assets).

            **Desktop app (GUI)** — Debian/Ubuntu:
            ```bash
            sudo dpkg -i bulwark-desktop_${{ steps.version.outputs.version }}_amd64.deb   # x86_64
            sudo dpkg -i bulwark-desktop_${{ steps.version.outputs.version }}_arm64.deb   # arm64
            ```
            Fedora/RHEL:
            ```bash
            sudo rpm -i bulwark-desktop-${{ steps.version.outputs.version }}.x86_64.rpm    # x86_64
            sudo rpm -i bulwark-desktop-${{ steps.version.outputs.version }}.aarch64.rpm   # arm64
            ```
            Any distro (portable, no install) — swap `x86_64` for `aarch64` on arm64:
            ```bash
            chmod +x bulwark-desktop-${{ steps.version.outputs.version }}-x86_64.AppImage
            ./bulwark-desktop-${{ steps.version.outputs.version }}-x86_64.AppImage
            ```

            **CLI (headless / over SSH)** — available for **x86_64 and arm64**. Debian/Ubuntu:
            ```bash
            # x86_64
            sudo dpkg -i bulwarkctl_${{ steps.version.outputs.version }}_amd64.deb
            # arm64 (Raspberry Pi, Ampere, Graviton, Apple-silicon VMs)
            sudo dpkg -i bulwarkctl_${{ steps.version.outputs.version }}_arm64.deb
            bulwarkctl scan
            ```
            Fedora/RHEL:
            ```bash
            sudo rpm -i bulwarkctl-${{ steps.version.outputs.version }}.x86_64.rpm    # x86_64
            sudo rpm -i bulwarkctl-${{ steps.version.outputs.version }}.aarch64.rpm   # arm64
            ```

            Verify your download against `SHA256SUMS`:
            ```bash
            sha256sum -c SHA256SUMS --ignore-missing
            ```

            Built on Ubuntu 22.04 (glibc 2.35), then installed and scan-tested in a clean container
            on **Ubuntu 22.04, 24.04 and 26.04, Debian 12, and Fedora 41** before this release was
            cut — every one of those is a gate on the release, not a claim.

            The arm64 artifacts are built, installed, and — for the desktop app — actually
            launched and screenshotted on **native arm64 runners**, not under emulation. A GUI
            that cannot draw a window fails the release on either architecture.
