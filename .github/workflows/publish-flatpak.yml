name: Publish Flatpak (GUI)

# Manual only. Builds the GUI Flatpak offline and produces a single-file
# `bulwark.flatpak` bundle, uploaded as a workflow artifact and (optionally)
# attached to a GitHub release. Flathub proper is a SEPARATE submission (a PR to
# flathub/flathub); this workflow does not push to Flathub.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "If set, attach the bundle to this existing release tag (e.g. v0.7.0). Leave blank to only produce a workflow artifact."
        required: false
        default: ""

permissions:
  contents: write   # only used when release_tag is set, to upload the asset

jobs:
  publish-flatpak:
    runs-on: ubuntu-24.04
    steps:
      # Shallow checkout: the manifest's `type: dir` copies the repo into the
      # sandbox, so keep .git small. A fresh checkout has no target/ or
      # node_modules, so nothing heavy is copied.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          # packaging/flatpak/shared-modules is a submodule carrying the libappindicator
          # build chain; without this the manifest references a file that isn't there.
          submodules: true

      - name: Install flatpak + builder + generator deps
        run: |
          set -euo pipefail
          sudo apt-get update
          # elfutils provides eu-strip/eu-elfcompress, which flatpak-builder uses
          # to split debuginfo into the .Debug extension (absent on stock runners).
          sudo apt-get install -y --no-install-recommends \
            flatpak flatpak-builder python3 python3-venv python3-pip git xz-utils elfutils
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install runtime + SDK + extensions (matches the manifest)
        run: |
          set -euo pipefail
          flatpak install -y --user --noninteractive flathub \
            org.gnome.Platform//50 \
            org.gnome.Sdk//50 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08 \
            org.freedesktop.Sdk.Extension.node20//25.08

      - name: Generate offline cargo/node sources
        run: scripts/flatpak-gen-sources.sh

      - name: Build Flatpak + bundle
        run: |
          set -euo pipefail
          # Build/state/repo OUTSIDE the repo tree so the `type: dir` source copy
          # can never recurse into its own build dir.
          flatpak-builder \
            --user --force-clean --disable-rofiles-fuse \
            --repo="$RUNNER_TEMP/fp-repo" \
            --state-dir="$RUNNER_TEMP/fp-state" \
            "$RUNNER_TEMP/fp-build" \
            packaging/flatpak/com.vietanhdev.bulwark.yaml
          flatpak build-bundle "$RUNNER_TEMP/fp-repo" \
            bulwark.flatpak com.vietanhdev.bulwark master

      - name: Install bundle + smoke-test
        run: |
          set -euo pipefail
          flatpak install -y --user bulwark.flatpak
          flatpak info com.vietanhdev.bulwark | grep -E "ID:|Version:"
          # The bundled CLI sidecar must resolve the rule pack from inside the
          # sandbox (proves install layout + next-to-exe rule resolution).
          flatpak run --command=bulwark com.vietanhdev.bulwark --version
          n=$(flatpak run --command=bulwark com.vietanhdev.bulwark rules list | grep -c '^BLWK-' || true)
          echo "rules visible in sandbox: $n"
          test "$n" -gt 0
          # Functional: real scan produces valid JSON with rules loaded; fix previews.
          # `scan` exits non-zero when it finds issues (linter-style), so capture
          # to a file and validate the JSON separately from the exit code.
          flatpak run --command=bulwark com.vietanhdev.bulwark scan --json > "$RUNNER_TEMP/scan.json" || true
          python3 -c 'import json,sys;d=json.load(open(sys.argv[1]));assert d["rules_loaded"]>0,d;print("scan OK: rules_loaded",d["rules_loaded"],"findings",len(d.get("findings",[])))' "$RUNNER_TEMP/scan.json"
          flatpak run --command=bulwark com.vietanhdev.bulwark fix list | grep -i "Available autofixes" >/dev/null && echo "fix preview OK"

      # Every assertion above passed on a build whose GUI crashed on launch: they all
      # drive `--command=bulwark`, the CLI sidecar, which shares a directory with the GUI
      # but not its code. The shipped app died in a libayatana-appindicator dlopen panic
      # (absent from the GNOME runtime) and, before that, logged "couldn't find a 'rules'
      # directory" because the GUI has its own resolver that only checked resource_dir().
      # So: launch the actual GUI binary under Xvfb and fail on any panic.
      - name: GUI launch test (the CLI smoke test cannot catch a GUI crash)
        run: |
          set -uo pipefail
          sudo apt-get install -y -qq xvfb >/dev/null
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x800x24 >/dev/null 2>&1 &
          sleep 3
          # No --socket overrides: run it exactly as a user would, so a missing runtime
          # library or a wrong permission fails here rather than on someone's desktop.
          timeout 60 flatpak run com.vietanhdev.bulwark >"$RUNNER_TEMP/gui.log" 2>&1 &
          APP_PID=$!
          sleep 25
          echo "----- GUI output -----"; cat "$RUNNER_TEMP/gui.log"; echo "----------------------"
          fail=0
          grep -qi "panicked" "$RUNNER_TEMP/gui.log" && { echo "FAIL: GUI panicked on launch"; fail=1; }
          grep -q "couldn.t find a .rules. directory" "$RUNNER_TEMP/gui.log" && {
            echo "FAIL: rules not resolved — continuous monitoring would be silently disabled"; fail=1; }
          grep -q "rules directory resolved" "$RUNNER_TEMP/gui.log" || {
            echo "FAIL: GUI never logged a resolved rules directory"; fail=1; }
          kill -0 $APP_PID 2>/dev/null || { echo "FAIL: GUI process died"; fail=1; }
          kill $APP_PID 2>/dev/null || true
          [ $fail -eq 0 ] && echo "GUI launch OK"
          exit $fail

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: bulwark-flatpak
          path: bulwark.flatpak
          if-no-files-found: error

      - name: Attach bundle to release
        if: ${{ github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: bulwark.flatpak
