name: Publish Snap (GUI)

# Manual publish; every run also builds + install-tests the snap. Publishing only
# happens on workflow_dispatch — a push (branch test) builds and smoke-tests but
# never uploads to the store.
#
# Required repository secret (publish only):
#   SNAPCRAFT_STORE_CREDENTIALS — output of `snapcraft export-login`, for an
#                                 account with upload rights to the 'bulwark' snap.
#
# Classic confinement: the store rejects a classic snap on EVERY channel (edge
# included) until the registered name is granted classic confinement via a
# Store-requests forum post (forum.snapcraft.io/c/store-requests/19). Register the
# name first (`snapcraft register bulwark`), then request classic, then publish.
on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Snap Store channel to release to"
        type: choice
        options: [edge, beta, candidate, stable]
        default: edge

permissions:
  contents: read

jobs:
  publish-snap:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      # Builds snap/snapcraft.yaml with LXD inside the runner.
      # TODO(pin): SHA-pin these snapcore actions to match repo policy.
      - name: Build snap
        id: build
        uses: snapcore/action-build@v1

      - name: Upload snap artifact
        uses: actions/upload-artifact@v7
        with:
          name: bulwark-snap
          path: ${{ steps.build.outputs.snap }}
          if-no-files-found: error

      - name: Install snap + smoke-test
        run: |
          set -euo pipefail
          sudo snap install --dangerous --classic "${{ steps.build.outputs.snap }}"
          # The CLI app must resolve the bundled rule pack (next-to-exe under $SNAP).
          bulwark.cli --version
          n=$(bulwark.cli rules list | grep -c '^BLWK-' || true)
          echo "rules visible from the snap: $n"
          test "$n" -gt 0
          # Functional: a real scan produces valid JSON with rules loaded; fix previews.
          # `scan` exits non-zero when it finds issues (linter-style), so capture
          # to a file and validate the JSON separately from the exit code.
          bulwark.cli scan --json > "$RUNNER_TEMP/scan.json" || true
          python3 -c 'import json,sys;d=json.load(open(sys.argv[1]));assert d["rules_loaded"]>0,d;print("scan OK: rules_loaded",d["rules_loaded"],"findings",len(d.get("findings",[])))' "$RUNNER_TEMP/scan.json"
          bulwark.cli fix list | grep -i "Available autofixes" >/dev/null && echo "fix preview OK"

      # Everything above drives bulwark.cli — the bundled CLI, which shares a directory with
      # the GUI but not a line of its code. The Flatpak passed the identical set of checks
      # while shipping a GUI that could not render at all (built without --features
      # custom-protocol, so it served devUrl and drew an empty window). The snap is built the
      # same way and had the same defect. So: launch the real GUI and look at the pixels.
      - name: GUI launch test (the CLI smoke test cannot catch a broken GUI)
        run: |
          set -uo pipefail
          sudo apt-get install -y -qq xvfb imagemagick x11-apps >/dev/null
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x800x24 >/dev/null 2>&1 &
          sleep 3
          export WEBKIT_DISABLE_DMABUF_RENDERER=1 LIBGL_ALWAYS_SOFTWARE=1 GDK_BACKEND=x11
          timeout 60 bulwark >"$RUNNER_TEMP/gui.log" 2>&1 &
          APP_PID=$!
          sleep 25
          echo "----- GUI output -----"; cat "$RUNNER_TEMP/gui.log"; echo "----------------------"
          fail=0
          grep -qi "panicked" "$RUNNER_TEMP/gui.log" && { echo "FAIL: GUI panicked"; fail=1; }
          grep -q "rules directory resolved" "$RUNNER_TEMP/gui.log" || {
            echo "FAIL: GUI never resolved a rules directory"; fail=1; }
          grep -qE "webview url: https?://" "$RUNNER_TEMP/gui.log" && {
            echo "FAIL: DEV build — UI served over http instead of the embedded frontend"; fail=1; }
          grep -q "webview url: tauri://" "$RUNNER_TEMP/gui.log" || {
            echo "FAIL: webview never loaded the embedded frontend"; fail=1; }
          kill -0 $APP_PID 2>/dev/null || { echo "FAIL: GUI process died"; fail=1; }
          import -window root "$RUNNER_TEMP/shot.png" 2>/dev/null || true
          if [ -f "$RUNNER_TEMP/shot.png" ]; then
            colors=$(identify -format "%k" "$RUNNER_TEMP/shot.png" 2>/dev/null || echo 0)
            echo "distinct colours on screen: ${colors}"
            [ "${colors:-0}" -lt 50 ] && { echo "FAIL: window is blank (${colors} colours)"; fail=1; }
          fi
          kill $APP_PID 2>/dev/null || true
          [ $fail -eq 0 ] && echo "snap GUI launch OK"
          exit $fail

      - name: Publish snap
        if: github.event_name == 'workflow_dispatch'
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: ${{ github.event.inputs.channel }}
