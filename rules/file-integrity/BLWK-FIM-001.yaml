id: BLWK-FIM-001
title: "File modified since baseline: {{ file_integrity.path }}"
category: file-integrity
severity: critical
collector: file_integrity
condition: changed == true and currently_present == true
explain: >
  {{ file_integrity.path }} no longer matches its recorded baseline hash. This file is
  monitored because it directly controls authentication, privilege, or persistence on this
  host — an unexpected change here is exactly what credential theft, backdoor account
  creation, or PAM/sudo tampering looks like.
fix: >
  Review the file's current contents against what you expect (version control, package
  manager, or your own memory of the last legitimate change). If the change wasn't yours,
  treat this as a likely compromise. If it was legitimate, run 'bulwarkctl fim baseline' to
  record the new state as the baseline.
references: [ATTACK-T1098, ATTACK-T1556]
