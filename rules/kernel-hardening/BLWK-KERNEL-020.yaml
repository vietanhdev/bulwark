id: BLWK-KERNEL-020
title: "Kernel module not blacklisted: {{ module_blacklist.module }}"
category: kernel-hardening
severity: low
collector: module_blacklist
condition: blacklisted == false
explain: >
  The '{{ module_blacklist.module }}' kernel module isn't blacklisted in /etc/modprobe.d/,
  meaning it can still be auto-loaded on demand — for the network protocol modules
  (dccp, sctp, rds, tipc) simply by an unprivileged process opening a socket of that
  family. All four have a documented history of local-privilege-escalation
  vulnerabilities reachable exactly that way; usb-storage is watched for a different
  reason (physical-media exfiltration/BadUSB), not remote exploitation.
fix: >
  If '{{ module_blacklist.module }}' isn't actually needed on this host, add
  'install {{ module_blacklist.module }} /bin/true' to a file under /etc/modprobe.d/
  (e.g. /etc/modprobe.d/blacklist-rare.conf) and run 'update-initramfs -u'.
references: [CIS-1.1.1]
