id: BLWK-NET-001
title: A VNC/remote-desktop port is listening
category: network-egress
severity: high
collector: listening_ports
condition: port in [5900, 5901, 5902, 6080]
explain: >
  Port {{ listening_ports.port }} is listening — this is a standard VNC (5900-range) or
  noVNC/websockify (6080) port. If this wasn't deliberately set up with a password and
  restricted access, it's a full remote-desktop backdoor.
fix: >
  If this isn't an intentional remote-desktop setup: stop the service (check 'ps aux' for
  x11vnc/vncserver/websockify) and remove any systemd unit or cron entry that restarts it.
references: [ATTACK-T1219]
