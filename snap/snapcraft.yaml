name: bulwark
title: Bulwark
base: core24
version: '0.10.0'   # set by scripts/bump-version.sh (checked by scripts/check-packaging-consistency.sh)
summary: Linux security misconfiguration & intrusion scanner (GUI)
description: |
  Bulwark scans a Linux host for security misconfigurations and intrusion
  indicators using a native Rust rule engine over declarative YAML rules, and
  explains findings in plain language with a suggested fix.

  This is the desktop GUI. Privileged scans elevate via pkexec/polkit and read
  system files under /etc, so this snap uses CLASSIC confinement — a strict
  sandbox would prevent it from auditing the host it is installed on. Classic
  confinement requires manual review and approval by the Snap Store team before
  it can be published; see packaging/README.md.

license: Apache-2.0
grade: stable
confinement: classic     # NOT strict: pkexec + host /etc access are load-bearing (see README)

# Declared, not incidental. Without this key snapcraft builds for the host arch only, so the
# snap was amd64-only purely because publish-snap.yml happens to say `runs-on: ubuntu-24.04` —
# an architecture decision recorded nowhere, enforced by nothing, and silently reversible by an
# unrelated edit to a workflow. Stating it makes the restriction reviewable, and gives
# scripts/check-packaging-consistency.sh something to assert against.
#
# amd64 only, deliberately: this snap needs `confinement: classic`, which requires manual Snap
# Store approval that has not been granted (and, per packaging/README.md, is unlikely to be —
# the criteria name /etc, sudo and pkexec in the not-supported list). Adding arm64 would
# multiply the build matrix for a channel that publishes nothing today. The build itself is now
# arch-clean — the Node tarball below follows CRAFT_ARCH_BUILD_FOR — so adding `arm64:` here is
# a one-line change if the channel ever opens.
platforms:
  amd64:

# tauri-plugin-single-instance claims a session-bus name at startup, and a sandbox
# blocks any name the manifest does not declare. In the Flatpak this produced a bare
# GDBus NotAllowed error painted on an empty window, before the UI existed. Classic
# confinement should not enforce this, but the declaration is cheap, is what the Tauri
# docs prescribe, and keeps the snap working if it ever moves to strict confinement.
#
# The name derives from tauri.conf.json's *identifier* with dots and dashes replaced by
# underscores. It must match what the binary asks for; rename it only together with the
# identifier, and let check-packaging-consistency.sh verify the two agree.
# https://v2.tauri.app/plugin/single-instance/#usage-in-snap-and-flatpak
slots:
  single-instance:
    interface: dbus
    bus: session
    name: org.com_vietanhdev_bulwark.SingleInstance

plugs:
  single-instance-plug:
    interface: dbus
    bus: session
    name: org.com_vietanhdev_bulwark.SingleInstance

apps:
  bulwark:
    command: bin/bulwark-app
    # classic snaps get no auto-connected desktop interfaces; the wrapper below
    # sets the library + resource paths the app needs.
    desktop: usr/share/applications/bulwark.desktop
    plugs:
      - single-instance-plug
    slots:
      - single-instance
  # The bundled CLI, exposed as `bulwark.cli` — usable directly, and what the CI
  # install-verify step smoke-tests (the GUI needs a display; the CLI doesn't).
  cli:
    command: bin/bulwark

parts:
  # ---------------------------------------------------------------------------
  # Frontend + Tauri app binary. Unlike the Launchpad PPA, snapcraft build
  # environments HAVE network access, so npm and cargo can fetch normally — no
  # vendoring needed here.
  # ---------------------------------------------------------------------------
  bulwark-app:
    plugin: nil
    source: .
    build-packages:
      - curl
      - build-essential
      - pkg-config
      - libwebkit2gtk-4.1-dev
      - libssl-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      # NOTE: no nodejs/npm here — core24 ships Node 18, too old for the vite
      # frontend build (needs >=20.12). override-build fetches Node 22 instead.
    stage-packages:
      # Runtime libs the app links against. Classic confinement means the app
      # runs unconfined, but its own binary still needs these present.
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libayatana-appindicator3-1
    override-build: |
      set -eux
      # Ubuntu 24.04's archive rustc may be too old for the workspace; pin a
      # current toolchain via rustup for the build.
      export RUSTUP_HOME="$CRAFT_PART_BUILD/.rustup"
      export CARGO_HOME="$CRAFT_PART_BUILD/.cargo"
      curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
      export PATH="$CARGO_HOME/bin:$PATH"

      # core24's Node is 18; the frontend build (vite/rolldown) needs >=20.12
      # (it imports styleText from node:util). Fetch an official Node 22 build.
      #
      # The Node tarball is the ONE prebuilt binary this build downloads, so it is the one
      # place that can silently hardcode an architecture — rustup's installer detects the host
      # on its own. It used to fetch -linux-x64 unconditionally, which was invisible while the
      # only builder was amd64 and would have failed with a bare "cannot execute binary file"
      # the moment anyone built on arm. Derive it from the arch snapcraft is building FOR.
      NODE_VER=22.12.0
      case "${CRAFT_ARCH_BUILD_FOR:-$(dpkg --print-architecture)}" in
        amd64)  NODE_ARCH=x64 ;;
        arm64)  NODE_ARCH=arm64 ;;
        armhf)  NODE_ARCH=armv7l ;;
        *) echo "unsupported build arch: ${CRAFT_ARCH_BUILD_FOR:-unknown}" >&2; exit 1 ;;
      esac
      curl -fsSL "https://nodejs.org/dist/v${NODE_VER}/node-v${NODE_VER}-linux-${NODE_ARCH}.tar.xz" \
        | tar -xJ -C "$CRAFT_PART_BUILD"
      export PATH="$CRAFT_PART_BUILD/node-v${NODE_VER}-linux-${NODE_ARCH}/bin:$PATH"
      node --version

      cd "$CRAFT_PART_SRC/apps/bulwark-app"
      npm ci
      npm run build            # vite -> apps/bulwark-app/dist (embedded by Tauri)

      # Build the GUI binary and the bundled CLI sidecar.
      # --features custom-protocol is REQUIRED: Tauri's build script does
      # `let dev = !custom_protocol`, so without it the app loads devUrl
      # (http://localhost:1420) rather than the embedded frontend and never renders.
      cargo build --release -p bulwark-app --features custom-protocol
      cargo build --release -p bulwarkctl

      # --- install layout --------------------------------------------------
      install -D -m0755 "$CRAFT_PART_SRC/target/release/bulwark-app" \
        "$CRAFT_PART_INSTALL/bin/bulwark-app"
      # The GUI shells out to a sidecar named `bulwark` (NOT bulwarkctl) sitting
      # beside the GUI binary — resolve_cli_binary pins exactly that.
      install -D -m0755 "$CRAFT_PART_SRC/target/release/bulwarkctl" \
        "$CRAFT_PART_INSTALL/bin/bulwark"

      # Rule pack / decoders / log-rules, beside the binaries. Verified in CI: the
      # bundled CLI (bulwark.cli) resolves /snap/bulwark/current/bin/rules
      # next-to-exe. The GUI's in-process scans use the same resolver; only the
      # GUI window rendering itself still wants an eyeball on a real desktop.
      for d in rules decoders log-rules; do
        cp -r "$CRAFT_PART_SRC/$d" "$CRAFT_PART_INSTALL/bin/$d"
      done

      # Desktop entry + icon. Every hicolor size is shipped rather than only 128:
      # GNOME asks for 48px constantly (dash, alt-tab, window list) and a 48
      # downscaled from 128 is visibly softer than one authored at 48.
      for s in 16 24 32 48 64 128 256 512; do
        install -D -m0644 "$CRAFT_PART_SRC/apps/bulwark-app/src-tauri/icons/${s}x${s}.png" \
          "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/${s}x${s}/apps/bulwark.png"
      done
      # The heredoc body is indented to stay inside this YAML block scalar, so the
      # leading spaces are stripped before writing: a .desktop line that starts
      # with whitespace is an error to desktop-file-validate (GLib tolerates it,
      # so it was invisible until something validated the file).
      sed 's/^ *//' <<'DESKTOP' | install -D -m0644 /dev/stdin \
        "$CRAFT_PART_INSTALL/usr/share/applications/bulwark.desktop"
      [Desktop Entry]
      Name=Bulwark
      Comment=Linux security misconfiguration & intrusion scanner
      Exec=bulwark
      Icon=bulwark
      Terminal=false
      Type=Application
      Categories=System;Security;
      # The GTK/Wayland app_id the window advertises is the binary name
      # (measured with WAYLAND_DEBUG=1: xdg_toplevel.set_app_id("bulwark-app")),
      # not this file's basename. GNOME matches window -> desktop entry on that
      # string; without this line the window gets a generic icon.
      StartupWMClass=bulwark-app
      DESKTOP

# NOTE on polkit: the standalone .deb/.rpm install polkit/com.bulwark.policy so
# pkexec uses auth_admin (one prompt per scan). A classic snap cannot drop a file
# into /usr/share/polkit-1/actions on the host, so a snap install falls back to
# the distro default polkit action for pkexec. Document this for snap users, or
# ship install-polkit.sh alongside — same opt-in caveat as the .deb today.
